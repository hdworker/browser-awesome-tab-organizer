<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tab Sorter</title>
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    
    h3 {
      margin-top: 0;
      text-align: center;
    }
    
    .settings-section {
      margin-bottom: 15px;
    }
    
    .settings-section label {
      display: block;
      margin-bottom: 5px;
    }
    
    .settings-section select {
      width: 100%;
      padding: 5px;
      margin-bottom: 10px;
    }
    
    .checkbox-group {
      margin-bottom: 15px;
    }
    
    .checkbox-group label {
      display: block;
      margin-bottom: 5px;
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    button {
      padding: 8px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .primary {
      background-color: #4285f4;
      color: white;
    }
    
    .secondary {
      background-color: #f1f3f4;
      color: #3c4043;
    }
    
    .status {
      text-align: center;
      padding: 10px;
      margin-top: 10px;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h3>Tab Sorter</h3>
  
  <div class="settings-section">
    <label for="sort-method">Метод сортировки:</label>
    <select id="sort-method">
      <option value="byTitle">По названию</option>
      <option value="byDomain">По домену</option>
      <option value="byLastAccessed">По последнему доступу</option>
      <option value="byFavicon">По favicon</option>
      <option value="byProtocol">По протоколу</option>
    </select>
  </div>
  
  <div class="checkbox-group">
    <label>
      <input type="checkbox" id="auto-sort"> Автоматическая сортировка
    </label>
    <label>
      <input type="checkbox" id="show-notifications"> Показывать уведомления
    </label>
  </div>
  
  <div class="button-group">
    <button id="sort-now" class="primary">Сортировать вкладки</button>
    <button id="group-tabs" class="secondary">Группировать по доменам</button>
  </div>
  
  <div id="status" class="status hidden">Сортировка...</div>
  
  <script src="popup.js"></script>
</body>
</html>
